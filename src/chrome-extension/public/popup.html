<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qlik MCP Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      background: #1a1a1a;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #252525;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    .status-text {
      font-size: 13px;
    }

    .section {
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      background: #252525;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .info-label {
      color: #888;
    }

    .info-value {
      color: #e0e0e0;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .input-group input {
      width: 100%;
      padding: 8px 12px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
    }

    .input-group input:focus {
      outline: none;
      border-color: #4f9bff;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #4f9bff;
      color: white;
    }

    .btn-primary:hover {
      background: #3d8bef;
    }

    .btn-secondary {
      background: #333;
      color: #e0e0e0;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #444;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Qlik MCP">
    <h1>Qlik MCP Bridge</h1>
  </div>

  <div class="status">
    <div id="statusDot" class="status-dot disconnected"></div>
    <span id="statusText" class="status-text">Connecting to MCP server...</span>
  </div>

  <div class="section">
    <div class="section-title">Current App</div>
    <div class="info-row">
      <span class="info-label">App</span>
      <span id="appName" class="info-value">None</span>
    </div>
    <div class="info-row">
      <span class="info-label">URL</span>
      <span id="qlikUrl" class="info-value">-</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Settings</div>
    <div class="input-group">
      <label for="wsUrl">MCP Server URL</label>
      <input type="text" id="wsUrl" placeholder="ws://localhost:9876">
    </div>
    <button id="saveBtn" class="btn btn-primary">Save & Reconnect</button>
    <button id="reconnectBtn" class="btn btn-secondary">Reconnect</button>
  </div>

  <div class="footer">
    Connect Claude to Qlik Sense via MCP
  </div>

  <script src="popup.js"></script>
</body>
</html>
